version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: nice_scan
    main: ./cmd/nice_scan
    binary: nice_scan
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{.ProjectName}}_{{.Version}}_{{.Os}}_{{.Arch}}"

checksum:
  name_template: "{{.ProjectName}}_{{.Version}}_checksums.txt"

snapshot:
  version_template: "{{.Version}}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^test:"

release:
  prerelease: auto
